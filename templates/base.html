<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Portal de Gesti&oacute;n Humana{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;700" rel="stylesheet">
    <style>
        :root {
            --background: #eef4f8;
            --surface: #ffffff;
            --surface-low: #f2f7fa;
            --surface-mid: #e2ecf1;
            --surface-high: #c8d8e1;
            --border-soft: #cfdee6;
            --border-strong: #a9c0cf;
            --text-main: #173041;
            --text-soft: #587184;
            --navy: #001871;
            --navy-soft: #16378f;
            --primary: #001871;
            --primary-light: #d7e3ff;
            --teal: #00bfb3;
            --purple: #981d97;
            --orange: #ed8b00;
            --success: #1f8f62;
            --warning: #bb7a11;
            --shadow-card: 0 22px 52px rgba(0, 24, 113, 0.10);
            --shadow-soft: 0 12px 28px rgba(0, 24, 113, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            background: var(--background);
        }

        body {
            font-family: "Inter", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(0, 169, 206, 0.20), transparent 24%),
                radial-gradient(circle at top right, rgba(0, 191, 179, 0.14), transparent 18%),
                linear-gradient(180deg, #f8fbfd 0%, #edf4f8 100%);
        }

        a {
            color: var(--primary);
            text-decoration: none;
        }

        a:hover {
            color: var(--navy);
        }

        .page-shell {
            position: relative;
            min-height: 100vh;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 450, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        h1, h2, h3, h4 {
            font-family: "Manrope", sans-serif;
            letter-spacing: -0.03em;
            margin: 0;
        }

        .app-layout {
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 270px;
            background: linear-gradient(180deg, rgba(0, 24, 113, 0.96) 0%, rgba(0, 34, 128, 0.95) 58%, rgba(0, 24, 113, 0.98) 100%);
            border-right: 1px solid rgba(0, 169, 206, 0.22);
            padding: 28px 18px;
            position: fixed;
            inset: 0 auto 0 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 18px;
            backdrop-filter: blur(18px);
        }

        .main-area {
            flex: 1;
            margin-left: 270px;
            min-width: 0;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 15;
            height: 74px;
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(169, 192, 207, 0.75);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            backdrop-filter: blur(18px);
        }

        .content-body {
            padding: 30px 28px 42px;
        }

        .brand-lockup {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 10px;
        }

        .brand-lockup .brand-mark {
            width: 64px;
            height: 64px;
            padding: 10px;
            border-radius: 18px;
            background: #ffffff url("https://raw.githubusercontent.com/AutomatizaRussell/Resourse_GestionHumana/main/Logo_RB2021.png") center center / 80% no-repeat;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.14);
            color: transparent;
        }

        .brand-lockup .brand-mark .material-symbols-outlined {
            font-size: 0;
            color: transparent;
        }

        .brand-mark {
            width: 46px;
            height: 46px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, #00a9ce 100%);
            color: white;
            box-shadow: var(--shadow-soft);
        }

        .brand-mark.is-logo {
            width: 64px;
            height: 64px;
            padding: 10px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.14);
        }

        .brand-mark.is-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .brand-title {
            font-size: 1.08rem;
            font-weight: 800;
            color: transparent;
            position: relative;
        }

        .brand-subtitle {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: transparent;
            margin-top: 3px;
            position: relative;
        }

        .brand-title::after {
            content: "Russell Bedford";
            color: var(--navy);
            position: absolute;
            inset: 0;
        }

        .brand-subtitle::after {
            content: "Gesti\00f3n Humana";
            color: var(--text-soft);
            position: absolute;
            inset: 0;
        }

        .sidebar .brand-title::after {
            color: #ffffff;
        }

        .sidebar .brand-subtitle::after {
            color: rgba(231, 241, 248, 0.72);
        }

        .nav-group {
            display: grid;
            gap: 6px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 14px;
            border-radius: 16px;
            color: rgba(233, 241, 249, 0.78);
            font-weight: 600;
            transition: 0.22s ease;
        }

        .nav-link:hover {
            transform: translateX(3px);
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .nav-link.is-active {
            background: linear-gradient(135deg, rgba(0, 169, 206, 0.22) 0%, rgba(0, 191, 179, 0.18) 100%);
            color: #ffffff;
            box-shadow: inset 0 0 0 1px rgba(0, 191, 179, 0.22);
        }

        .surface-card {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(216, 226, 232, 0.95);
            border-radius: 22px;
            box-shadow: var(--shadow-card);
        }

        .surface-muted {
            background: rgba(242, 247, 250, 0.92);
            border: 1px solid rgba(207, 222, 230, 0.95);
            border-radius: 18px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(0, 169, 206, 0.14);
            border: 1px solid rgba(0, 169, 206, 0.18);
            color: var(--primary);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 18px;
            border-radius: 999px;
            border: 1px solid transparent;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            color: white;
            background: linear-gradient(135deg, var(--primary) 0%, var(--navy-soft) 70%, #00a9ce 100%);
            box-shadow: 0 12px 24px rgba(0, 24, 113, 0.24);
        }

        .btn-secondary {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.92);
            border-color: rgba(194, 208, 219, 0.9);
        }

        .btn-accent {
            color: white;
            background: linear-gradient(135deg, var(--orange) 0%, #f1a63f 100%);
            box-shadow: 0 12px 24px rgba(237, 139, 0, 0.24);
        }

        .muted {
            color: var(--text-soft);
        }

        .hero-panel {
            display: grid;
            grid-template-columns: 1.45fr 0.9fr;
            gap: 22px;
            padding: 24px;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
        }

        .metric-card {
            padding: 22px;
        }

        .metric-title {
            color: var(--text-soft);
            font-size: 0.92rem;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 2.3rem;
            font-weight: 800;
            color: var(--navy);
        }

        .split-grid {
            display: grid;
            grid-template-columns: 1.45fr 0.95fr;
            gap: 22px;
        }

        .search-shell {
            position: relative;
            width: min(520px, 100%);
        }

        .search-shell input {
            width: 100%;
            border: none;
            background: var(--surface-low);
            color: var(--text-main);
            border-radius: 999px;
            padding: 13px 18px 13px 46px;
            font-size: 0.95rem;
            outline: none;
        }

        .search-shell .material-symbols-outlined {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8a98a3;
            font-size: 21px;
        }

        .field-input {
            width: 100%;
            padding: 15px 16px;
            border-radius: 16px;
            border: 1px solid rgba(194, 208, 219, 0.9);
            background: rgba(255, 255, 255, 0.94);
            color: var(--text-main);
            outline: none;
            font-family: inherit;
        }

        .field-input {
            transition: 0.2s ease;
        }

        .field-input:focus {
            border-color: rgba(0, 169, 206, 0.56);
            box-shadow: 0 0 0 4px rgba(0, 169, 206, 0.16);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .status-pill.success {
            color: var(--success);
            background: rgba(31, 143, 98, 0.1);
        }

        .status-pill.warning {
            color: var(--warning);
            background: rgba(187, 122, 17, 0.12);
        }

        .status-pill.info {
            color: var(--primary);
            background: rgba(0, 24, 113, 0.1);
        }

        .mini-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
        }

        code {
            background: var(--surface-low);
            color: var(--navy);
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        @media (max-width: 860px) {
            .sidebar {
                position: static;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--surface-high);
            }

            .main-area {
                margin-left: 0;
            }

            .app-layout {
                display: block;
            }

            .stack-mobile {
                grid-template-columns: 1fr !important;
            }

            .panel-mobile {
                padding: 24px !important;
            }

            .hero-panel,
            .split-grid,
            .metric-grid {
                grid-template-columns: 1fr !important;
            }

            .topbar {
                height: auto;
                padding: 18px;
                gap: 16px;
                align-items: flex-start;
                flex-direction: column;
            }

            .content-body {
                padding: 22px 18px 32px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        {% block content %}{% endblock %}
    </div>
    <script>
        (function () {
            const replacements = [
                ["GestiÃ³n Humana", "Gestión Humana"],
                ["AdministraciÃ³n", "Administración"],
                ["Sesion iniciada como", "Sesión iniciada como"],
                ["Cerrar sesion", "Cerrar sesión"],
                ["Gestion operativa de empleados con una experiencia mas clara y ejecutiva.", "Gestión operativa de empleados con una experiencia más clara y ejecutiva."],
                ["Centraliza altas, actualizaciones, importaciones desde Excel y eventos de integracion desde un panel", "Centraliza altas, actualizaciones, importaciones desde Excel y eventos de integración desde un panel"],
                ["Ãšltima actualizaciÃ³n:", "Última actualización:"],
                ["Workspace rapido", "Accesos rápidos"],
                ["catalogo", "catálogo"],
                ["autenticacion", "autenticación"],
                ["Todas las Ã¡reas", "Todas las áreas"],
                ["Ãrea", "Área"],
                ["Sin Ã¡rea", "Sin área"],
                ["PÃ¡gina", "Página"],
                ["InformaciÃ³n general", "Información general"],
                ["Asistente de importaciÃ³n", "Asistente de importación"],
                ["vacÃ­as", "vacías"],
                ["espaÃ±ol", "español"],
                ["tÃ©cnicos", "técnicos"],
                ["AdemÃ¡s", "Además"],
                ["informaciÃ³n", "información"],
                ["Ultimos", "Últimos"],
                ["Aun", "Aún"],
                ["Gestion corporativa de empleados desde un portal interno mas limpio y consistente.", "Gestión corporativa de empleados desde un portal interno más limpio y consistente."],
                ["Inicia sesion para acceder al dashboard, navegar por empleados, procesar importaciones Excel", "Inicia sesión para acceder al dashboard, navegar por empleados, procesar importaciones de Excel"],
                ["area interna", "área interna"],
                ["despues de autenticacion", "después de la autenticación"],
                ["Welcome back", "Bienvenido"],
                ["Iniciar sesion", "Iniciar sesión"],
                ["contrasena", "contraseña"],
                ["contrasena incorrectos", "contraseña incorrectos"],
                ["podras acceder tambien", "podrás acceder también"],
                ["entraras", "entrarás"],
                ["codigo", "código"],
                ["Correo electronico", "Correo electrónico"],
                ["Numero de documento", "Número de documento"],
                ["Telefono", "Teléfono"],
                ["Edicion autorizada", "Edición autorizada"],
                ["permiso de edicion", "permiso de edición"]
            ];

            const fallbackReplacements = [
                ["Gesti\\u00c3\\u00b3n Humana", "Gesti\\u00f3n Humana"],
                ["Administraci\\u00c3\\u00b3n", "Administraci\\u00f3n"],
                ["Sesion iniciada como", "Sesi\\u00f3n iniciada como"],
                ["Cerrar sesion", "Cerrar sesi\\u00f3n"],
                ["Gestion operativa de empleados con una experiencia mas clara y ejecutiva.", "Gesti\\u00f3n operativa de empleados con una experiencia m\\u00e1s clara y ejecutiva."],
                ["Centraliza altas, actualizaciones, importaciones desde Excel y eventos de integracion desde un panel", "Centraliza altas, actualizaciones, importaciones desde Excel y eventos de integraci\\u00f3n desde un panel"],
                ["\\u00c3\\u0161ltima actualizaci\\u00c3\\u00b3n:", "\\u00daltima actualizaci\\u00f3n:"],
                ["Workspace rapido", "Accesos r\\u00e1pidos"],
                ["catalogo", "cat\\u00e1logo"],
                ["autenticacion", "autenticaci\\u00f3n"],
                ["Todas las \\u00c3\\u00a1reas", "Todas las \\u00e1reas"],
                ["\\u00c3\\u0081rea", "\\u00c1rea"],
                ["Sin \\u00c3\\u00a1rea", "Sin \\u00e1rea"],
                ["P\\u00c3\\u00a1gina", "P\\u00e1gina"],
                ["Informaci\\u00c3\\u00b3n general", "Informaci\\u00f3n general"],
                ["Asistente de importaci\\u00c3\\u00b3n", "Asistente de importaci\\u00f3n"],
                ["vac\\u00c3\\u00adas", "vac\\u00edas"],
                ["espa\\u00c3\\u00b1ol", "espa\\u00f1ol"],
                ["t\\u00c3\\u00a9cnicos", "t\\u00e9cnicos"],
                ["Adem\\u00c3\\u00a1s", "Adem\\u00e1s"],
                ["informaci\\u00c3\\u00b3n", "informaci\\u00f3n"],
                ["Ultimos", "\\u00daltimos"],
                ["Aun", "A\\u00fan"],
                ["Gestion corporativa de empleados desde un portal interno mas limpio y consistente.", "Gesti\\u00f3n corporativa de empleados desde un portal interno m\\u00e1s limpio y consistente."],
                ["Inicia sesion para acceder al dashboard, navegar por empleados, procesar importaciones Excel", "Inicia sesi\\u00f3n para acceder al dashboard, navegar por empleados, procesar importaciones de Excel"],
                ["area interna", "\\u00e1rea interna"],
                ["despues de autenticacion", "despu\\u00e9s de la autenticaci\\u00f3n"],
                ["Welcome back", "Bienvenido"],
                ["Iniciar sesion", "Iniciar sesi\\u00f3n"],
                ["contrasena", "contrase\\u00f1a"],
                ["podras acceder tambien", "podr\\u00e1s acceder tambi\\u00e9n"],
                ["entraras", "entrar\\u00e1s"],
                ["codigo", "c\\u00f3digo"],
                ["Correo electronico", "Correo electr\\u00f3nico"],
                ["Numero de documento", "N\\u00famero de documento"],
                ["Telefono", "Tel\\u00e9fono"],
                ["Edicion autorizada", "Edici\\u00f3n autorizada"],
                ["permiso de edicion", "permiso de edici\\u00f3n"]
            ];

            function normalizeText(value) {
                let text = value;
                replacements.forEach(([source, target]) => {
                    text = text.split(source).join(target);
                });
                fallbackReplacements.forEach(([source, target]) => {
                    text = text.split(source).join(target);
                });
                return text;
            }

            function updateNode(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    const next = normalizeText(node.textContent);
                    if (next !== node.textContent) {
                        node.textContent = next;
                    }
                    return;
                }

                if (node.nodeType !== Node.ELEMENT_NODE) {
                    return;
                }

                ["placeholder", "value", "title", "aria-label"].forEach((attribute) => {
                    if (node.hasAttribute(attribute)) {
                        const current = node.getAttribute(attribute);
                        const next = normalizeText(current);
                        if (next !== current) {
                            node.setAttribute(attribute, next);
                        }
                    }
                });

                Array.from(node.childNodes).forEach(updateNode);
            }

            updateNode(document.body);
        })();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
